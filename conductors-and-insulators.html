<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaking Tutor — Conductors & Insulators</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a24;
    --surface2: #1e2333;
    --border: #2a3050;
    --accent: #4fd1c5;
    --accent2: #f6ad55;
    --danger: #fc8181;
    --text: #e2e8f0;
    --muted: #718096;
    --pulse: #4fd1c5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(79,209,197,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(246,173,85,0.05) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeDown 0.6s ease both;
  }

  header h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--accent);
    line-height: 1.1;
  }

  header p {
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .api-bar {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 20px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .api-bar label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .api-bar input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-bar input:focus { border-color: var(--accent); }

  .api-bar button {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .api-bar button:hover { opacity: 0.85; transform: translateY(-1px); }

  .chat-container {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 420px;
    animation: fadeUp 0.6s 0.2s ease both;
    margin-bottom: 16px;
  }

  .chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-log::-webkit-scrollbar { width: 4px; }
  .chat-log::-webkit-scrollbar-track { background: transparent; }
  .chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease both;
  }

  .msg.tutor { flex-direction: row; }
  .msg.student { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
    font-family: 'Space Mono', monospace;
  }

  .tutor .msg-avatar {
    background: linear-gradient(135deg, var(--accent), #38b2ac);
    color: #0d0f14;
  }

  .student .msg-avatar {
    background: linear-gradient(135deg, var(--accent2), #ed8936);
    color: #0d0f14;
  }

  .msg-bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.55;
  }

  .tutor .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top-left-radius: 3px;
    color: var(--text);
  }

  .student .msg-bubble {
    background: rgba(79,209,197,0.1);
    border: 1px solid rgba(79,209,197,0.25);
    border-top-right-radius: 3px;
    color: var(--text);
  }

  .msg-bubble .correction {
    margin-top: 8px;
    padding: 6px 10px;
    background: rgba(252,129,129,0.1);
    border-left: 2px solid var(--danger);
    border-radius: 4px;
    font-size: 0.82rem;
    color: #feb2b2;
    font-family: 'Space Mono', monospace;
  }

  /* Controls */
  .controls {
    width: 100%;
    max-width: 680px;
    display: flex;
    gap: 12px;
    align-items: center;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .btn-mic {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
    flex-shrink: 0;
  }

  .btn-mic:hover { background: rgba(79,209,197,0.1); }

  .btn-mic.recording {
    background: rgba(79,209,197,0.15);
    border-color: var(--accent);
    animation: pulse-ring 1.2s ease infinite;
  }

  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(79,209,197,0.4); }
    70% { box-shadow: 0 0 0 14px rgba(79,209,197,0); }
    100% { box-shadow: 0 0 0 0 rgba(79,209,197,0); }
  }

  .btn-help {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--accent2);
    background: transparent;
    color: var(--accent2);
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .btn-help:hover { background: rgba(246,173,85,0.1); }

  .btn-reset {
    padding: 14px 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-reset:hover { border-color: var(--danger); color: var(--danger); }

  /* Status bar */
  .status {
    width: 100%;
    max-width: 680px;
    margin-top: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.05em;
    min-height: 18px;
    animation: fadeUp 0.6s 0.35s ease both;
  }

  .status.active { color: var(--accent); }
  .status.warn { color: var(--accent2); }
  .status.error { color: var(--danger); }

  /* Transcript preview */
  .transcript-preview {
    width: 100%;
    max-width: 680px;
    min-height: 36px;
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    margin-top: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    font-style: italic;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  /* Loading dots */
  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 4px 0;
  }

  .typing-indicator span {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s ease infinite;
    opacity: 0.6;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .disabled { opacity: 0.4; pointer-events: none; }
</style>
</head>
<body>

<header>
  <h1>Speaking Tutor</h1>
  <p>Conductors, Insulators &amp; Resistance</p>
  <p id="questionBadge" style="margin-top:6px;font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--accent2);">Enter API key to start</p>
</header>

<div class="api-bar">
  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." />
  <button onclick="startSession()">Start</button>
</div>

<div class="chat-container">
  <div class="chat-log" id="chatLog">
    <div class="msg tutor">
      <div class="msg-avatar">T</div>
      <div class="msg-bubble">Enter your API key and press <strong>Start</strong> to begin the session.</div>
    </div>
  </div>
</div>

<div class="controls" id="controls">
  <button class="btn-mic disabled" id="btnMic" onclick="toggleMic()">🎙️</button>
  <button class="btn-help disabled" id="btnHelp" onclick="requestHelp()">💡 Help — I'm stuck</button>
  <button class="btn-reset disabled" id="btnReset" onclick="resetSession()">↺ Restart</button>
</div>

<div class="transcript-preview" id="transcriptPreview">Your words will appear here while you speak...</div>
<div class="status" id="status">Enter API key to begin</div>

<script>
const QUESTIONS = [
  { q: "What is electric current?", keys: "flow of electric charge through a material; moves through some materials better than others" },
  { q: "What is a conductor? Give two examples.", keys: "material that allows electric current to flow easily; examples include copper, metals, liquids, gases" },
  { q: "What is an insulator? Give two examples.", keys: "material that resists movement of electric charge; examples include glass, rubber, plastic, wood" },
  { q: "Why are metals good conductors?", keys: "contain many free electrons not attached to atoms, free to move through the material" },
  { q: "Why are insulators important for electrical safety?", keys: "cables covered with insulating material like rubber or plastic; safe to touch even when connected to power" },
  { q: "What is resistance?", keys: "opposition to the passage of electric current; electrons collide with atoms; energy converted into heat" },
  { q: "What is the difference between a conductor and an insulator in terms of resistance?", keys: "conductor has low resistance; insulator has high resistance" },
  { q: "What happens to free electrons when a wire is connected to a battery?", keys: "free electrons move through the wire; creates an electric current" }
];

const SYSTEM_PROMPT = `You are an English speaking tutor evaluating a student's spoken answer.

You will receive a message in this format:
QUESTION: [the question]
KEY IDEAS: [concepts that must be present]
STUDENT SAID: [transcription of student's speech]

You must respond with ONLY a JSON object, no other text, no markdown, no explanation outside the JSON:
{
  "correct": true or false,
  "grammar_error": true or false,
  "pronunciation_error": true or false,
  "message": "your short feedback message (max 2 sentences)"
}

EVALUATION RULES:
- "correct": true if the student demonstrated understanding of the key ideas. Synonyms and paraphrases are fine. Do NOT require exact wording.
- "grammar_error": true if there is a clear grammatical error (wrong verb form, wrong article, wrong tense, etc.)
- "pronunciation_error": true if the transcription contains phonetically distorted words (e.g. "konduktor", "elecrons", "rezistanse")
- "message": 
  - If correct=true AND no errors: one word of praise only, e.g. "Great!" or "Exactly!"
  - If correct=false: one short hint using a keyword. e.g. "Think about the word 'flow'."
  - If grammar_error=true: show ONLY the correct form. e.g. "Say: 'it IS the flow of electric charge'." Nothing else.
  - If pronunciation_error=true: show ONLY the correct word. e.g. "The word is 'conductor'." Nothing else.
  - NEVER ask a follow-up question in the message. NEVER say "Can you tell me more". ONE sentence maximum.

If STUDENT SAID starts with [SESSION START]: respond with {"correct":true,"grammar_error":false,"pronunciation_error":false,"message":"Hello! Let's begin. What is electric current?"}
If STUDENT SAID starts with [HELP REQUEST]: respond with {"correct":false,"grammar_error":false,"pronunciation_error":false,"message":"[one keyword hint for the current question]"}
If STUDENT SAID starts with [SILENCE TIMEOUT]: respond with {"correct":false,"grammar_error":false,"pronunciation_error":false,"message":"Take your time! [one keyword hint]"}`;

let conversationHistory = [];
let recognition = null;
let isRecording = false;
let silenceTimer = null;
let sessionActive = false;
let apiKey = '';
let isSpeaking = false;
let currentInterimTranscript = '';
let currentQuestion = 1;
let awaitingRetry = false; // true when student must retry current question

// Keywords that MUST appear (at least one per group) for each question
const QUESTION_CHECKS = {
  1: [['flow','current','charge','electricity','moves','passes']],
  2: [['conductor','conducts','conducting'], ['copper','metal','liquid','gas','wire','silver']],
  3: [['insulator','insulating','resist','block'], ['glass','rubber','plastic','wood']],
  4: [['free electron','free electrons','electrons','electron'], ['not attached','not fixed','move freely','free to move','large number']],
  5: [['safe','safety','protect','covered','insulated','insulating material','rubber','plastic']],
  6: [['opposition','resist','obstruction','oppose','blocks','slows'], ['electron','atom','collide','collision','heat','energy']],
  7: [['low resistance','less resistance'], ['high resistance','more resistance']],
  8: [['move','flow','travel','pass'], ['current','electricity','wire']]
};

function checkAnswer(questionNum, studentText) {
  const text = studentText.toLowerCase();
  const groups = QUESTION_CHECKS[questionNum];
  if (!groups) return true; // no check defined, allow through
  for (const group of groups) {
    const found = group.some(kw => text.includes(kw));
    if (!found) return false; // missing at least one required concept
  }
  return true;
}

const SILENCE_TIMEOUT = 8000;

function startSession() {
  apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey.startsWith('sk-ant-')) {
    setStatus('Invalid API key format', 'error');
    return;
  }
  sessionActive = true;
  document.getElementById('btnMic').classList.remove('disabled');
  document.getElementById('btnHelp').classList.remove('disabled');
  document.getElementById('btnReset').classList.remove('disabled');
  setStatus('Session started — press 🎙️ to speak', 'active');
  document.getElementById('questionBadge').textContent = 'Question 1 of 8';
  sendToTutor('[SESSION START]');
}

function toggleMic() {
  if (!sessionActive) return;
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    setStatus('Speech recognition not supported. Use Chrome.', 'error');
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('btnMic').classList.add('recording');
    document.getElementById('btnMic').textContent = '⏹️';
    setStatus('Listening... speak now', 'active');
    resetSilenceTimer();
  };

  recognition.onresult = (event) => {
    resetSilenceTimer();
    let interim = '';
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        final += event.results[i][0].transcript;
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    currentInterimTranscript = interim;
    document.getElementById('transcriptPreview').textContent = (final || interim) || 'Listening...';
    if (final.trim()) {
      stopRecording();
      document.getElementById('transcriptPreview').textContent = final.trim();
      sendToTutor(final.trim());
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') {
      onSilenceTimeout();
    } else {
      setStatus('Mic error: ' + e.error, 'error');
      stopRecording();
    }
  };

  recognition.onend = () => {
    if (isRecording) {
      // Restart if we didn't intentionally stop
      try { recognition.start(); } catch(e) {}
    }
  };

  recognition.start();
}

function stopRecording() {
  isRecording = false;
  clearTimeout(silenceTimer);
  document.getElementById('btnMic').classList.remove('recording');
  document.getElementById('btnMic').textContent = '🎙️';
  if (recognition) {
    recognition.onend = null;
    try { recognition.stop(); } catch(e) {}
    recognition = null;
  }
  setStatus('Processing...', 'active');
}

function resetSilenceTimer() {
  clearTimeout(silenceTimer);
  silenceTimer = setTimeout(onSilenceTimeout, SILENCE_TIMEOUT);
}

function onSilenceTimeout() {
  if (isRecording) {
    stopRecording();
    setStatus('', '');
    sendToTutor('[SILENCE TIMEOUT] The student has been silent for 8 seconds. Encourage them gently and give a small hint to help them continue.');
  }
}

function requestHelp() {
  if (!sessionActive) return;
  if (isRecording) stopRecording();
  setStatus('Asking for help...', 'warn');
  addMessage('student', '💡 Help, I\'m stuck!');
  sendToTutor('[HELP REQUEST] The student pressed the help button and needs a hint.');
}

async function sendToTutor(userText) {
  // Only show real student speech in chat
  if (!userText.startsWith('[')) {
    addMessage('student', userText);
  }

  const typingId = addTypingIndicator();
  setStatus('Tutor is thinking...', 'active');

  // Build structured evaluation prompt
  let evalPrompt;
  if (userText.startsWith('[SESSION START]') || userText.startsWith('[HELP REQUEST]') || userText.startsWith('[SILENCE TIMEOUT]')) {
    evalPrompt = `QUESTION: ${QUESTIONS[currentQuestion-1].q}\nKEY IDEAS: ${QUESTIONS[currentQuestion-1].keys}\nSTUDENT SAID: ${userText}`;
  } else {
    evalPrompt = `QUESTION: ${QUESTIONS[currentQuestion-1].q}\nKEY IDEAS: ${QUESTIONS[currentQuestion-1].keys}\nSTUDENT SAID: ${userText}`;
  }

  conversationHistory.push({ role: 'user', content: evalPrompt });

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTypingIndicator(typingId);

    if (!response.ok) {
      const errMsg = data?.error?.message || 'API error';
      setStatus('Error: ' + errMsg, 'error');
      addMessage('tutor', '⚠️ ' + errMsg);
      return;
    }

    const raw = data.content?.[0]?.text || '';
    conversationHistory.push({ role: 'assistant', content: raw });

    let parsed;
    try {
      parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    } catch(e) {
      // Fallback if JSON parse fails
      addMessage('tutor', raw);
      speakText(raw);
      setStatus('Your turn — press 🎙️ to speak', '');
      return;
    }

    const { correct, grammar_error, pronunciation_error, message } = parsed;

    // CODE controls advancement — not Claude
    const canAdvance = correct && !grammar_error && !pronunciation_error;

    let fullMessage = message;

    if (canAdvance && currentQuestion < 8) {
      // Correct — advance to next question
      currentQuestion++;
      updateQuestionBadge();
      fullMessage = message + ' ' + QUESTIONS[currentQuestion-1].q;
    } else if (canAdvance && currentQuestion === 8) {
      // All done
      fullMessage = '🎉 ' + message + ' You have completed all 8 questions. Well done!';
      updateQuestionBadge();
    } else {
      // NOT correct, OR grammar error, OR pronunciation error
      // Always repeat the same question after the correction
      fullMessage = message + ' ' + QUESTIONS[currentQuestion-1].q;
    }

    addMessage('tutor', fullMessage);
    speakText(fullMessage);
    setStatus('Your turn — press 🎙️ to speak', '');

  } catch (err) {
    removeTypingIndicator(typingId);
    setStatus('Network error: ' + err.message, 'error');
    addMessage('tutor', '⚠️ Connection error. Check your API key and internet connection.');
  }
}

function updateQuestionBadge() {
  const el = document.getElementById('questionBadge');
  if (el) el.textContent = 'Question ' + currentQuestion + ' of 8';
}

function addMessage(role, text) {
  const log = document.getElementById('chatLog');
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;
  msg.innerHTML = `
    <div class="msg-avatar">${role === 'tutor' ? 'T' : 'S'}</div>
    <div class="msg-bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
  `;
  log.appendChild(msg);
  log.scrollTop = log.scrollHeight;
  return msg;
}

function addTypingIndicator() {
  const log = document.getElementById('chatLog');
  const id = 'typing-' + Date.now();
  const el = document.createElement('div');
  el.className = 'msg tutor';
  el.id = id;
  el.innerHTML = `
    <div class="msg-avatar">T</div>
    <div class="msg-bubble">
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  return id;
}

function removeTypingIndicator(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const clean = text.replace(/[⚠️💡✅❌🎙️⏹️]/g, '');
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'en-GB';
  utter.rate = 0.85;
  utter.pitch = 1.0;

  // Prefer British English voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang === 'en-GB' && v.name.includes('Google')) ||
                    voices.find(v => v.lang === 'en-GB') ||
                    voices.find(v => v.name.includes('Daniel')) ||
                    voices.find(v => v.name.includes('Kate')) ||
                    voices.find(v => v.lang.startsWith('en'));
  if (preferred) utter.voice = preferred;

  isSpeaking = true;
  utter.onend = () => { isSpeaking = false; };
  window.speechSynthesis.speak(utter);
}

function resetSession() {
  if (isRecording) stopRecording();
  window.speechSynthesis.cancel();
  conversationHistory = [];
  sessionActive = false;
  currentQuestion = 1;
  document.getElementById('questionBadge').textContent = 'Enter API key to start';
  document.getElementById('chatLog').innerHTML = `
    <div class="msg tutor">
      <div class="msg-avatar">T</div>
      <div class="msg-bubble">Session reset. Press <strong>Start</strong> to begin again.</div>
    </div>
  `;
  document.getElementById('btnMic').classList.add('disabled');
  document.getElementById('btnHelp').classList.add('disabled');
  document.getElementById('btnReset').classList.add('disabled');
  document.getElementById('transcriptPreview').textContent = 'Your words will appear here while you speak...';
  setStatus('Enter API key to begin', '');

  // Re-enable start if key still present
  if (document.getElementById('apiKey').value.trim()) {
    sessionActive = false;
  }
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (type || '');
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// Load voices async
window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>
